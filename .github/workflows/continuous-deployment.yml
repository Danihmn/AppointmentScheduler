name: Continuous Integration, Delivery and Deployment with GitHub Actions and .NET 10
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Setup dotnet
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            10.0.x

      - name: Restore dependencies
        run: dotnet restore AppointmentScheduler.slnx
        working-directory: AppointmentScheduler

      - name: Build Solution
        run: dotnet build AppointmentScheduler.slnx --configuration Release --no-restore
        working-directory: AppointmentScheduler

      - name: Docker Compose Build
        run: docker compose build
        working-directory: AppointmentScheduler

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_ACCESS_TOKEN }}

      - name: Tag Docker Image
        run: docker tag ${{ secrets.DOCKER_USERNAME }}/${{ secrets.IMAGE_NAME }}:latest ${{
          secrets.DOCKER_USERNAME }}/${{ secrets.IMAGE_NAME }}:${{ github.run_id }}

      - name: Push to Docker Hub
        run: docker push ${{ secrets.DOCKER_USERNAME }}/${{ secrets.IMAGE_NAME }}:latest && docker push ${{ secrets.DOCKER_USERNAME }}/${{ secrets.IMAGE_NAME }}:${{ github.run_id }}

      - name: Azure Container Registry login
        uses: azure/docker-login@v1
        with:
          username: ${{ secrets.AZ_CONTAINER_REGISTRY_USERNAME }}
          password: ${{ secrets.AZ_CONTAINER_REGISTRY_PASSWORD }}
          login-server: ${{ secrets.AZURE_CONTAINER_REGISTRY }}

      - name: Push Docker Images to Azure Container Registry
        run: |
          docker tag ${{ secrets.DOCKER_USERNAME }}/${{ secrets.IMAGE_NAME }}:latest ${{ secrets.AZURE_CONTAINER_REGISTRY }}/${{ secrets.IMAGE_NAME }}:latest &&
            docker tag ${{ secrets.DOCKER_USERNAME }}/${{ secrets.IMAGE_NAME }}:latest ${{ secrets.AZURE_CONTAINER_REGISTRY }}/${{ secrets.IMAGE_NAME }}:${{ github.run_id }}

          docker push ${{ secrets.AZURE_CONTAINER_REGISTRY }}/${{ secrets.IMAGE_NAME }}:latest
          docker push ${{ secrets.AZURE_CONTAINER_REGISTRY }}/${{ secrets.IMAGE_NAME }}:${{ github.run_id }}

      - name: Azure Login
        uses: Azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Azure WebApp - Configure App Settings
        uses: Azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az webapp config appsettings set \
              --name appointment-scheduler-api \
              --resource-group appointment_scheduler_api \
              --settings \
                "WEBSITES_PORT=8080" \
                "ConnectionStrings__DefaultConnection=${{ secrets.DB_CONNECTION_STRING }}" \
                "JWT_PRIVATE_KEY=${{ secrets.JWT_PRIVATE_KEY }}" \
                "ASPNETCORE_ENVIRONMENT=Production"

      - name: Azure WebApp - Enable Managed Identity for ACR
        uses: Azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az webapp config set \
              --name appointment-scheduler-api \
              --resource-group appointment_scheduler_api \
              --set siteConfig.acrUseManagedIdentityCreds=true

      - name: Azure WebApp - App Deployment
        uses: Azure/webapps-deploy@v2.2.19
        with:
          app-name: appointment-scheduler-api
          images: ${{ secrets.AZURE_CONTAINER_REGISTRY }}/${{ secrets.IMAGE_NAME }}:latest