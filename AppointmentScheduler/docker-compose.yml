services:
  appointment-scheduler:
    image: danihmn/appointment-scheduler:latest
    build:
      context: .
      dockerfile: AppointmentScheduler/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ASPNETCORE_HTTPS_PORTS=8443
      - ConnectionStrings__DefaultConnection=Server=host.docker.internal,1433;Database=AppointmentSchedulerDB;User Id=sa;Password=Admin1234;TrustServerCertificate=True
    ports:
      - "8080"
      - "8443"
    volumes:
      - ${APPDATA}/Microsoft/UserSecrets:/home/app/.microsoft/usersecrets:ro
      - ${APPDATA}/Microsoft/UserSecrets:/root/.microsoft/usersecrets:ro
      - ${APPDATA}/ASP.NET/Https:/home/app/.aspnet/https:ro
      - ${APPDATA}/ASP.NET/Https:/root/.aspnet/https:ro
    networks:
      - appointment-scheduler_network
  
networks:
  appointment-scheduler_network: 
    driver: bridge